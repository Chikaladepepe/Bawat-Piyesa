<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Jai</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Richer Light Purple Theme */
            --bg-color: linear-gradient(135deg, #e7dfff 0%, #dcd0ff 100%);
            --env-color: #f0eaff;
            --env-dark: #d1c4ff;
            --seal-color: #9b6cc3;
            --text-color: #4a4a4a;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--bg-color);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* Ambient Floating Particles */
        .particle {
            position: absolute;
            background: rgba(155, 108, 195, 0.2);
            border-radius: 50%;
            pointer-events: none;
            animation: float 10s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        /* Envelope Wrapper */
        .envelope-wrapper {
            position: relative;
            cursor: pointer;
            transition: transform 0.3s;
            z-index: 10;
        }

        .envelope-wrapper:hover {
            transform: scale(1.05);
        }

        .envelope {
            position: relative;
            width: 300px;
            height: 200px;
            background: var(--env-dark);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* Flap Animation */
        .flap {
            position: absolute;
            top: 0;
            width: 0;
            height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 100px solid var(--env-color);
            transform-origin: top;
            transition: transform 0.6s 0.4s ease;
            z-index: 3;
        }

        /* Envelope Front Pocket */
        .pocket {
            position: absolute;
            bottom: 0;
            width: 0;
            height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-bottom: 100px solid var(--env-color);
            z-index: 4;
        }

        .pocket::before {
            content: '';
            position: absolute;
            bottom: -100px;
            left: -150px;
            border-left: 150px solid var(--env-dark);
            border-top: 100px solid transparent;
            border-bottom: 100px solid transparent;
        }

        .pocket::after {
            content: '';
            position: absolute;
            bottom: -100px;
            right: -150px;
            border-right: 150px solid var(--env-dark);
            border-top: 100px solid transparent;
            border-bottom: 100px solid transparent;
        }

        /* The Letter */
        .letter {
            position: absolute;
            bottom: 5px;
            left: 10px;
            width: 280px;
            height: 180px;
            background: white;
            padding: 25px;
            box-sizing: border-box;
            transition: transform 0.8s 0.8s ease, height 0.8s 0.8s ease, top 0.8s 0.8s ease;
            z-index: 2;
            overflow-y: auto;
            box-shadow: 0 0 15px rgba(0,0,0,0.05);
            scrollbar-width: thin;
            scrollbar-color: var(--seal-color) transparent;
        }

        .letter::-webkit-scrollbar { width: 3px; }
        .letter::-webkit-scrollbar-thumb { background: var(--seal-color); }

        .letter p {
            font-size: 0.95rem;
            line-height: 1.8;
            color: var(--text-color);
            margin: 0;
            text-align: center;
            font-weight: 300;
        }

        /* The Wax Seal J */
        .seal {
            position: absolute;
            top: 80px;
            left: 130px;
            width: 40px;
            height: 40px;
            background: var(--seal-color);
            border-radius: 50%;
            z-index: 5;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.5s ease;
        }

        /* Animation States */
        .envelope-wrapper.open .flap {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .envelope-wrapper.open .letter {
            transform: translateY(-130px);
            height: 380px;
            z-index: 6;
        }

        .envelope-wrapper.open .seal {
            transform: scale(0);
        }

        /* Light Sub-text Instruction */
        .hint-text {
            margin-top: 25px;
            font-size: 0.75rem;
            letter-spacing: 1px;
            opacity: 0.4;
            transition: opacity 0.8s ease;
            pointer-events: none;
        }

        .fade-out {
            opacity: 0 !important;
        }
    </style>
</head>
<body>

    <!-- Local Music Reference -->
    <audio id="mySong">
        <source src="music.mp3" type="audio/mp3">
    </audio>

    <div class="envelope-wrapper" id="envelopeWrap" onclick="openEnvelope()">
        <div class="envelope">
            <div class="flap"></div>
            <div class="pocket"></div>
            <div class="letter" id="letterPaper">
                <p>
                    Hello Jai<br><br>
                    I wanted to tell you how much you mean to me<br><br>
                    Bawat piyesa ng buhay ko ay mas kumpleto dahil sa iyo<br><br>
                    (Paste your long letter here when ready)<br><br>
                    I love you Julian Cute
                </p>
            </div>
            <div class="seal">J</div>
        </div>
    </div>

    <!-- The light sub-text -->
    <div class="hint-text" id="instruction">Click or tap on the seal to open</div>

    <script>
        function openEnvelope() {
            const wrap = document.getElementById('envelopeWrap');
            const hint = document.getElementById('instruction');
            const song = document.getElementById('mySong');

            // Only trigger if not already open
            if (!wrap.classList.contains('open')) {
                wrap.classList.add('open');
                hint.classList.add('fade-out');

                // Try to play music.mp3
                song.play().catch(error => {
                    console.log("Music play failed. Ensure music.mp3 is in the folder.");
                });
            }
        }

        // Background floating particles
        for (let i = 0; i < 25; i++) {
            let p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.width = p.style.height = Math.random() * 12 + 4 + 'px';
            p.style.animationDelay = Math.random() * 8 + 's';
            p.style.animationDuration = Math.random() * 5 + 7 + 's';
            document.body.appendChild(p);
        }
    </script>
</body>
</html>
